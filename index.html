<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markus Amberla Portfolio</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="./src/output.css" rel="stylesheet">
    <style>
        /* Custom scrollbar for a premium feel */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2b2b2b;
        }

        ::-webkit-scrollbar-thumb {
            background: #616161;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #909090;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="antialiased transition-colors duration-300">

    <!-- Main Container -->
    <div id="app" class="min-h-screen flex flex-col">

        <!-- Hero Section -->
        <header class="container mx-auto px-6 py-20 flex flex-col-reverse md:flex-row items-center justify-between">
            <div class="md:w-1/2 text-center md:text-left mt-10 md:mt-0">
                <h1 id="profile-name" class="text-5xl md:text-6xl font-bold mb-4 tracking-tight"></h1>
                <p id="profile-tagline" class="text-xl md:text-2xl mb-6 opacity-90 font-light"></p>
                <p id="profile-description" class="text-lg mb-8 leading-relaxed opacity-80 max-w-lg mx-auto md:mx-0"></p>

                <div id="social-links" class="flex flex-wrap items-center justify-center md:justify-start gap-y-4 gap-x-6">
                    <div class="relative">
                        <button id="qr-toggle-btn"
                            class="px-6 py-3 flex items-center justify-center rounded-lg font-medium transition-all duration-300 transform hover:-translate-y-1 hover:shadow-lg bg-amber-600 text-white focus:outline-none"
                            aria-label="Show QR Code"
                            onclick="document.getElementById('qr-container').classList.toggle('hidden')">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h2v2h-2zm4 0h2v2h-2zm-4 4h2v2h-2zm4 0h2v2h-2z">
                                </path>
                            </svg>
                        </button>
                        <div id="qr-container" class="hidden absolute left-1/2 -translate-x-1/2 bottom-full mb-4 z-10 transition-all duration-300">
                            <img src="assets/qr-code.svg" alt="QR Code" class="w-32 h-32 max-w-none bg-white rounded-lg p-2 shadow-2xl">
                        </div>
                    </div>
                    <!-- Social links injected here -->
                </div>
            </div>
            <div class="md:w-1/2 flex justify-center">
                <div class="relative">
                    <div class="absolute inset-0 bg-yellow-500 rounded-full blur-3xl opacity-20"></div>
                    <!-- animate-pulse -->
                    <img id="profile-picture" src="" alt="Profile"
                        class="relative w-64 h-64 md:w-80 md:h-80 rounded-full object-cover border-4 border-opacity-50 shadow-2xl">
                </div>
            </div>
        </header>

        <!-- Skills Section -->
        <section class="py-16 bg-opacity-50 bg-black">
            <div class="container mx-auto px-6">
                <h2 class="text-3xl font-bold mb-12 text-center">Technical Skills</h2>
                <div id="skills-list" class="flex flex-wrap justify-center gap-4">
                    <!-- Skills injected here -->
                </div>
            </div>
        </section>

        <!-- Projects -->

        <!-- Commercial Projects Section -->
        <section class="py-20">
            <div class="container mx-auto px-6">
                <h2 id="commercial-projects-title" class="text-3xl font-bold mb-6 text-center">
                    <!-- Projects title injected here -->
                </h2>
                <h3 id="commercial-projects-description" class="text-xl mb-12 opacity-80 text-center">
                    <!-- Projects description injected here -->
                </h3>
                <div id="commercial-projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Projects injected here -->
                </div>
            </div>
        </section>

        <!-- Scool Projects Section -->
        <section class="py-20">
            <div class="container mx-auto px-6">
                <h2 id="school-projects-title" class="text-3xl font-bold mb-6 text-center">
                    <!-- Projects title injected here -->
                </h2>
                <h3 id="school-projects-description" class="text-xl mb-12 opacity-80 text-center">
                    <!-- Projects description injected here -->
                </h3>
                <div id="school-projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Projects injected here -->
                </div>
            </div>
        </section>

        <!-- Side Projects Section -->
        <section class="py-20">
            <div class="container mx-auto px-6">
                <h2 id="side-projects-title" class="text-3xl font-bold mb-6 text-center">
                    <!-- Projects title injected here -->
                </h2>
                <h3 id="side-projects-description" class="text-xl mb-12 opacity-80 text-center">
                    <!-- Projects description injected here -->
                </h3>
                <div id="side-projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Projects injected here -->
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-8 text-center opacity-60 text-sm">
            <p>&copy; <span id="year"></span> <span id="footer-name"></span></p>
        </footer>

    </div>

    <!-- Load Config and Script -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
